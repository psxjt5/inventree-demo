#This file is used to package the demo plugin.
#
#- It was generated by the InvenTree Plugin Creator tool - version 1.14.0
#- Ref: https://github.com/inventree/plugin_creator

[build-system]
requires = ["setuptools", "twine", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inventree-demo"
description = "A short description of the project"
dynamic = ["version"]
authors = [
    { name = "James Todd",email = "James.Todd@nottingham.ac.uk" },
]
readme = "README.md"
license = "MIT"
keywords = ["inventree", "plugin"]
requires-python = ">=3.9"
dependencies = [
    # Enter your plugin library dependencies here
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Framework :: InvenTree",
]
[project.urls]
Homepage = "https://my-project-url.com"

[project.entry-points."inventree_plugins"]
demo = "demo.core:demo"

[tool.setuptools.packages.find]
where = [""]

[tool.setuptools.dynamic]
version = {attr = "demo.PLUGIN_VERSION"} 

[tool.ruff]
exclude = [
    ".git",
    "__pycache__",
    "test.py",
    "tests",
    "venv",
    "env",
    ".venv",
    ".env",
]

src=["demo"]
